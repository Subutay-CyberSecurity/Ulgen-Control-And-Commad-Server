<!DOCTYPE html>
<html>
<head>
    <title>C2 Sunucu - Dosyalar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0a0e1c;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: #14182b;
            padding: 20px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #2a2f45;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #00ff9d;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        .nav {
            display: flex;
            gap: 10px;
        }
        
        .nav a {
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px;
            background: #1e2338;
            transition: all 0.3s;
        }
        
        .nav a:hover {
            background: #00ff9d;
            color: #0a0e1c;
        }
        
        .nav a.active {
            background: #00ff9d;
            color: #0a0e1c;
        }
        
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: #14182b;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #2a2f45;
            text-align: center;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #00ff9d;
        }
        
        .stat-label {
            color: #888;
            margin-top: 5px;
        }
        
        .files-panel {
            background: #14182b;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #2a2f45;
        }
        
        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .files-header h2 {
            color: #00ff9d;
            font-weight: 300;
        }
        
        .filter-input {
            padding: 8px 12px;
            background: #0a0e1c;
            border: 1px solid #2a2f45;
            border-radius: 5px;
            color: #fff;
            width: 250px;
        }
        
        .files-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .files-table th {
            text-align: left;
            padding: 12px;
            background: #1e2338;
            color: #00ff9d;
            font-weight: 500;
            font-size: 14px;
        }
        
        .files-table td {
            padding: 12px;
            border-bottom: 1px solid #2a2f45;
            font-size: 14px;
        }
        
        .files-table tr:hover {
            background: #1e2338;
        }
        
        .file-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
            font-weight: 600;
        }
        
        .file-badge.agent {
            background: #00ff9d;
            color: #0a0e1c;
        }
        
        .file-badge.server {
            background: #ffaa00;
            color: #0a0e1c;
        }
        
        .download-btn {
            background: #00ff9d;
            color: #0a0e1c;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .download-btn:hover {
            background: #00cc7a;
            box-shadow: 0 0 10px #00ff9d;
        }
        
        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 5px;
        }
        
        .delete-btn:hover {
            background: #ff3333;
        }
        
        .logout {
            text-align: right;
            margin-top: 20px;
        }
        
        .logout a {
            color: #888;
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid #2a2f45;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .logout a:hover {
            color: #ff4d4d;
            border-color: #ff4d4d;
        }
        
        .no-files {
            text-align: center;
            padding: 40px;
            color: #888;
            font-style: italic;
        }
        
        .size-bar {
            background: #1e2338;
            height: 4px;
            border-radius: 2px;
            margin-top: 5px;
            width: 100px;
        }
        
        .size-fill {
            background: #00ff9d;
            height: 4px;
            border-radius: 2px;
        }
        
        .copy-btn {
            background: #1e2338;
            color: #fff;
            border: 1px solid #2a2f45;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .copy-btn:hover {
            background: #2a2f45;
        }
        
        @media (max-width: 768px) {
            .stats-panel {
                grid-template-columns: 1fr;
            }
            
            .files-header {
                flex-direction: column;
                gap: 10px;
            }
            
            .filter-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 C2 DOSYA YÖNETİMİ</h1>
            <div class="nav">
                <a href="/dashboard">AJANLAR</a>
                <a href="/files" class="active">DOSYALAR</a>
            </div>
        </div>
        
        <div class="stats-panel">
            <div class="stat-box">
                <div class="stat-value" id="totalFiles">0</div>
                <div class="stat-label">Toplam Dosya</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalSize">0 MB</div>
                <div class="stat-label">Toplam Boyut</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="agentFiles">0</div>
                <div class="stat-label">Ajandan Gelen</div>
            </div>
        </div>
        
        <div class="files-panel">
            <div class="files-header">
                <h2>📋 TÜM DOSYALAR</h2>
                <div style="display: flex; gap: 10px;">
                    <input type="text" class="filter-input" id="fileFilter" placeholder="Dosya ara..." onkeyup="filterFiles()">
                    <button class="copy-btn" onclick="copyAllLinks()">📋 Tüm Linkleri Kopyala</button>
                </div>
            </div>
            
            <table class="files-table">
                <thead>
                    <tr>
                        <th>DOSYA ADI</th>
                        <th>AJAN</th>
                        <th>BOYUT</th>
                        <th>YÜKLENME</th>
                        <th>TİP</th>
                        <th>İŞLEMLER</th>
                    </tr>
                </thead>
                <tbody id="filesList">
                    <tr>
                        <td colspan="6" class="no-files">Dosya bekleniyor...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="logout">
            <a href="/logout">🔴 ÇIKIŞ YAP</a>
        </div>
    </div>

    <script>
        let files = [];
        
        function loadFiles() {
            fetch('/api/files')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        files = data.files || [];
                        updateStats();
                        filterFiles();
                    }
                })
                .catch(error => console.error('Dosyalar alınamadı:', error));
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function updateStats() {
            const totalFiles = files.length;
            const totalBytes = files.reduce((sum, file) => sum + (file.size || 0), 0);
            const totalMB = (totalBytes / (1024 * 1024)).toFixed(2);
            const agentFiles = files.filter(f => f.type === 'from_agent').length;
            
            document.getElementById('totalFiles').textContent = totalFiles;
            document.getElementById('totalSize').textContent = totalMB;
            document.getElementById('agentFiles').textContent = agentFiles;
        }
        
        function filterFiles() {
            const filter = document.getElementById('fileFilter').value.toLowerCase();
            const filteredFiles = files.filter(f => 
                f.filename.toLowerCase().includes(filter) ||
                (f.agentName || '').toLowerCase().includes(filter)
            );
            
            renderFiles(filteredFiles);
        }
        
        function renderFiles(fileList) {
            const filesList = document.getElementById('filesList');
            
            if (fileList.length === 0) {
                filesList.innerHTML = '<tr><td colspan="6" class="no-files">Dosya bulunamadı</td></tr>';
                return;
            }
            
            filesList.innerHTML = fileList.map(file => {
                const date = new Date(file.timestamp).toLocaleString('tr-TR');
                const size = formatBytes(file.size);
                const type = file.type === 'from_agent' ? 'AJAN → SUNUCU' : 'SUNUCU → AJAN';
                const typeClass = file.type === 'from_agent' ? 'agent' : 'server';
                
                return `
                    <tr>
                        <td>
                            <strong>${file.filename}</strong>
                            <div class="size-bar">
                                <div class="size-fill" style="width: ${Math.min(100, (file.size / (1024*1024)) * 10)}%"></div>
                            </div>
                        </td>
                        <td>${file.agentName || file.agentId || 'Bilinmiyor'}</td>
                        <td>${size}</td>
                        <td>${date}</td>
                        <td><span class="file-badge ${typeClass}">${type}</span></td>
                        <td>
                            <button class="download-btn" onclick="downloadFile('${file.id}', '${file.filename}')">⬇ İNDİR</button>
                            <button class="delete-btn" onclick="deleteFile('${file.id}')">🗑 SİL</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function downloadFile(fileId, fileName) {
            // Direkt indirme linkine yönlendir
            window.location.href = `/api/files/${fileId}/download`;
            
            // Kısa bir mesaj göster
            showNotification(`⬇ ${fileName} indiriliyor...`);
        }
        
        function deleteFile(fileId) {
            if (confirm('Dosyayı silmek istediğinize emin misiniz?')) {
                fetch(`/api/files/${fileId}`, { method: 'DELETE' })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            showNotification('✅ Dosya silindi');
                            loadFiles();
                        } else {
                            alert('Dosya silinemedi: ' + data.error);
                        }
                    })
                    .catch(error => {
                        alert('Bağlantı hatası: ' + error);
                    });
            }
        }
        
        function copyAllLinks() {
            const links = files.map(f => `${window.location.origin}/api/files/${f.id}/download`).join('\n');
            navigator.clipboard.writeText(links).then(() => {
                showNotification('📋 Tüm linkler kopyalandı!');
            }).catch(() => {
                alert('Linkler kopyalanamadı');
            });
        }
        
        function showNotification(message) {
            // Basit notification
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #00ff9d;
                color: #0a0e1c;
                padding: 12px 24px;
                border-radius: 5px;
                font-weight: 600;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }
        
        // CSS animasyonları
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // Sayfa yüklendiğinde dosyaları getir ve her 5 saniyede bir güncelle
        loadFiles();
        setInterval(loadFiles, 5000);
    </script>
</body>
</html>
